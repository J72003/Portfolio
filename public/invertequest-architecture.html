<!doctype html>
<html>
<head>
<meta charset="utf8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>InverteQuest — System Architecture</title>
<style>
/* ── Tokens ── */
:root {
  --bg:      #070f18;
  --surf:    #0e1f2e;
  --surf2:   #122638;
  --bord:    #1a3448;
  --bord2:   #234060;
  --t1:      #ddeaf5;
  --t2:      #7090a8;
  --t3:      #2e4a60;
  --client:  #22d3ee;
  --auth:    #a78bfa;
  --edge:    #fbbf24;
  --ai:      #34d399;
  --data:    #f87171;
  --panel-w: 310px;
}
@media (prefers-color-scheme: light) {
  :root {
    --bg:#eef4f8;--surf:#fff;--surf2:#e8f0f8;--bord:#c0d4e4;
    --bord2:#7090a8;--t1:#0a1820;--t2:#405870;--t3:#90b0c8;
  }
}
:root[data-theme="light"] {
  --bg:#eef4f8;--surf:#fff;--surf2:#e8f0f8;--bord:#c0d4e4;
  --bord2:#7090a8;--t1:#0a1820;--t2:#405870;--t3:#90b0c8;
}
:root[data-theme="dark"] {
  --bg:#070f18;--surf:#0e1f2e;--surf2:#122638;--bord:#1a3448;
  --bord2:#234060;--t1:#ddeaf5;--t2:#7090a8;--t3:#2e4a60;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;flex-direction:column}

/* ── Header ── */
.hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px;border-bottom:1px solid var(--bord);
  background:var(--surf);flex-shrink:0;gap:12px;
}
.hd-left{display:flex;align-items:baseline;gap:14px}
.hd-eyebrow{font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ai);font-weight:700}
.hd-name{font-family:Georgia,'Times New Roman',serif;font-style:italic;font-size:1.3rem;color:var(--t1)}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{font-size:.68rem;font-family:'Courier New',monospace;padding:3px 8px;border-radius:3px;border:1px solid var(--bord);color:var(--t2);background:var(--surf2);letter-spacing:.03em}

/* ── Body ── */
.body{display:flex;flex:1;overflow:hidden;min-height:0}

/* ── Diagram ── */
.diag-wrap{flex:1;overflow:auto;min-width:0;padding:16px;display:flex;justify-content:center;align-items:flex-start}
#svg{width:100%;max-width:820px;height:auto;cursor:default;flex-shrink:0}

/* SVG class-based styling */
.node-bg{fill:var(--surf);stroke:var(--bord);stroke-width:1;transition:stroke .2s,filter .2s}
.node-group{cursor:pointer}
.node-group:hover .node-bg,.node-group.sel .node-bg{stroke-width:1.5}
.node-title{font-family:Georgia,'Times New Roman',serif;font-size:13px;fill:var(--t1)}
.node-sub{font-family:'Courier New',monospace;font-size:10px;fill:var(--t2)}
.layer-lbl{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;font-weight:700}
.edge-path{fill:none;stroke-width:1.5;stroke-dasharray:8 5;opacity:.38;transition:opacity .22s,stroke-width .22s}
.edge-path.lit{opacity:.95;stroke-width:2.2}
@keyframes flow{from{stroke-dashoffset:26}to{stroke-dashoffset:0}}
.edge-path{animation:flow 2s linear infinite}
.edge-path.lit{animation:flow .65s linear infinite}
.edge-lbl{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:9px;opacity:.6;transition:opacity .2s}
.edge-lbl.lit{opacity:1}

/* ── Detail panel ── */
.panel{
  width:var(--panel-w);min-width:var(--panel-w);
  background:var(--surf);border-left:1px solid var(--bord);
  display:flex;flex-direction:column;overflow:hidden;
  transform:translateX(100%);transition:transform .28s cubic-bezier(.32,.72,0,1);
  flex-shrink:0;
}
.panel.open{transform:translateX(0)}
.ph{padding:16px 18px 12px;border-bottom:1px solid var(--bord);display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.ph-meta{min-width:0}
.p-badge{font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;font-weight:700;padding:2px 7px;border-radius:3px;margin-bottom:7px;display:inline-block}
.p-name{font-family:Georgia,'Times New Roman',serif;font-size:1.1rem;color:var(--t1);line-height:1.2;text-wrap:balance}
.p-sub{font-family:'Courier New',monospace;font-size:.75rem;color:var(--t2);margin-top:4px}
.p-close{background:none;border:none;color:var(--t3);font-size:20px;cursor:pointer;padding:0 4px;line-height:1;flex-shrink:0;margin-top:2px}
.p-close:hover{color:var(--t1)}
.pb{padding:16px 18px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:14px}
.ps-lbl{font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--t3);font-weight:700;margin-bottom:6px}
.p-desc{font-size:.85rem;color:var(--t2);line-height:1.7}
.tech-row{display:flex;flex-wrap:wrap;gap:4px}
.tc{font-size:.68rem;font-family:'Courier New',monospace;padding:3px 7px;border-radius:3px;background:var(--surf2);border:1px solid var(--bord);color:var(--t2)}

/* ── Footer ── */
.ft{
  display:flex;align-items:center;gap:18px;flex-wrap:wrap;
  padding:8px 20px;border-top:1px solid var(--bord);
  background:var(--surf);flex-shrink:0;
}
.leg-item{display:flex;align-items:center;gap:5px;font-size:.72rem;color:var(--t2)}
.leg-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.trace-btn{
  margin-left:auto;font-size:.75rem;font-weight:600;
  padding:5px 14px;border-radius:4px;border:1px solid var(--ai);
  background:transparent;color:var(--ai);cursor:pointer;
  transition:background .18s,color .18s;letter-spacing:.04em;
}
.trace-btn:hover{background:var(--ai);color:var(--bg)}
.trace-btn:disabled{opacity:.5;cursor:not-allowed}
.trace-status{font-size:.72rem;color:var(--ai);font-style:italic;min-width:160px;display:none}
.trace-status.vis{display:block}

/* ── Mobile panel overlay ── */
@media(max-width:680px){
  .panel{position:fixed;top:0;right:0;bottom:0;width:100vw;min-width:unset;z-index:50}
  .diag-wrap{padding:12px}
}
</style>
</head>
<body>

<div class="hd">
  <div class="hd-left">
    <span class="hd-eyebrow">System Architecture</span>
    <span class="hd-name">InverteQuest</span>
  </div>
  <div class="chips">
    <span class="chip">Expo SDK 56</span>
    <span class="chip">Supabase</span>
    <span class="chip">RF-DETR</span>
    <span class="chip">Claude Haiku</span>
    <span class="chip">Vercel</span>
  </div>
</div>

<div class="body">
  <div class="diag-wrap">
    <svg id="svg" viewBox="0 0 780 660" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
  <aside class="panel" id="panel">
    <div class="ph">
      <div class="ph-meta">
        <div class="p-badge" id="pbadge"></div>
        <div class="p-name" id="pname"></div>
        <div class="p-sub" id="psub"></div>
      </div>
      <button class="p-close" id="pclose" aria-label="Close">×</button>
    </div>
    <div class="pb">
      <div><div class="ps-lbl">Tech stack</div><div class="tech-row" id="ptech"></div></div>
      <div><div class="ps-lbl">Role</div><div class="p-desc" id="pdesc"></div></div>
    </div>
  </aside>
</div>

<div class="ft">
  <div class="leg-item"><div class="leg-dot" style="background:#22d3ee"></div>Client</div>
  <div class="leg-item"><div class="leg-dot" style="background:#a78bfa"></div>Auth</div>
  <div class="leg-item"><div class="leg-dot" style="background:#fbbf24"></div>Edge</div>
  <div class="leg-item"><div class="leg-dot" style="background:#34d399"></div>AI</div>
  <div class="leg-item"><div class="leg-dot" style="background:#f87171"></div>Data</div>
  <div class="trace-status" id="trace-status"></div>
  <button class="trace-btn" id="trace-btn">Trace request →</button>
</div>

<script>
/* DATA */
const LAYERS = [
  { id:'client', label:'CLIENT', color:'#22d3ee', cy:80  },
  { id:'auth',   label:'AUTH',   color:'#a78bfa', cy:210 },
  { id:'edge',   label:'EDGE',   color:'#fbbf24', cy:340 },
  { id:'ai',     label:'AI',     color:'#34d399', cy:460 },
  { id:'data',   label:'DATA',   color:'#f87171', cy:580 },
];

const NODES = {
  expo: {
    cx:185, cy:80, w:210, h:56, layer:'client',
    title:'Expo Mobile App', sub:'React Native 0.85 · SDK 56',
    tech:['React Native 0.85','Expo SDK 56','TypeScript','React 19','Zustand','React Query'],
    desc:'Native iOS/Android client. Handles camera capture, specimen logging form, collection view, offline sync queue, and the anonymous to email OTP account upgrade flow. Shares the same codebase as the Vercel web deployment via Expo for Web.',
  },
  vercel: {
    cx:595, cy:80, w:210, h:56, layer:'client',
    title:'Vercel Web App', sub:'Expo for Web · Edge Runtime',
    tech:['Expo for Web','Vercel Edge','React 19','React Native Web'],
    desc:'Web deployment of the same Expo codebase. Camera uses the browser MediaDevices API. Used for field demos and the Claude Corps Fellowship submission. Same Supabase auth, data, and AI stack as the native app.',
  },
  auth: {
    cx:185, cy:210, w:210, h:56, layer:'auth',
    title:'Supabase Auth', sub:'Anonymous, OTP email upgrade',
    tech:['Supabase Auth v2','JWT / PKCE','supabase-js v2','AsyncStorage'],
    desc:'Users start with an anonymous session, zero sign-up friction. After their first specimen save, a 6-digit OTP prompt offers to link an email. The anonymous account is upgraded in-place via updateUser({email}) then verifyOtp({type:"email_change"}). No data migration required.',
  },
  resend: {
    cx:595, cy:210, w:210, h:56, layer:'auth',
    title:'Resend SMTP', sub:'smtp.resend.com:465',
    tech:['Resend','TLS SMTP port 465','Supabase custom SMTP','{{ .Token }} template'],
    desc:'Delivers 6-digit OTP codes and verification emails. Configured as Supabase custom SMTP provider, which unlocks editable email templates. Templates include {{ .Token }} for the numeric code alongside the standard magic-link fallback URL.',
  },
  edge: {
    cx:390, cy:340, w:230, h:56, layer:'edge',
    title:'identify-specimen', sub:'Supabase Edge Function · Deno',
    tech:['Deno (Supabase Edge)','TypeScript','Promise.all','Anthropic SDK','Roboflow REST'],
    desc:'Receives a base64 image from the client. Fires RF-DETR and Claude Haiku in parallel via Promise.all. Applies the agreement protocol: both models agree at 0.75 or above then auto-accept; disagreement then human-review flag. Returns a structured AIIdentificationResult including bboxes and reasoning text.',
  },
  rfdetr: {
    cx:185, cy:460, w:210, h:56, layer:'ai',
    title:'RF-DETR Small', sub:'Roboflow Serverless · 83.9% mAP',
    tech:['RF-DETR Small','Roboflow serverless','512x512 input','12 classes','NsfStem v3 dataset'],
    desc:'Domain-specific object detector trained on 1,482 augmented images (NsfStem v3, TAMUSA NSF STEM dataset). Returns class name, class index, confidence, and bounding box. Strongest on Baetidae, Elmidae, and Petrophila. Missing Plecoptera order, a known gap that causes structural EPT undercount.',
  },
  claude: {
    cx:595, cy:460, w:210, h:56, layer:'ai',
    title:'Claude Haiku', sub:'claude-haiku-4-5 · Vision API',
    tech:['claude-haiku-4-5-20251001','Anthropic Messages API','Base64 vision','Structured JSON output'],
    desc:'General-purpose vision model called for every capture. Receives the image as base64 with a structured prompt listing all 13 taxa. Returns class name, class index, confidence, and a natural-language reasoning field displayed in the app AI Suggestion Banner to help the user understand the identification.',
  },
  db: {
    cx:185, cy:580, w:210, h:56, layer:'data',
    title:'Supabase Database', sub:'PostgreSQL · RLS · React Query',
    tech:['PostgreSQL','Supabase RLS','Row-level security','React Query cache','supabase-js'],
    desc:'Stores specimens (user ID, taxon ID, image URL, AI predictions JSON, size, habitat, behaviors, GPS, timestamp) and the taxa reference table (13 classes with FBI tolerance scores and EPT flags). Row-level security ensures users can only read their own data.',
  },
  storage: {
    cx:595, cy:580, w:210, h:56, layer:'data',
    title:'Supabase Storage', sub:'S3-compatible · specimen images',
    tech:['Supabase Storage','S3-compatible','Public buckets','JPEG direct upload'],
    desc:'Stores full-resolution specimen photos uploaded directly from the client at save time. The Edge Function receives base64 only (not the URL) keeping the AI pipeline independent of storage. Reference images for each taxon are planned for a future taxa detail screen.',
  },
};

const EDGES = [
  { id:'ea', from:'expo',   to:'auth',   color:'#a78bfa', marker:'auth',
    path:'M 185,108 C 185,152 185,158 185,182', label:'session', bidir:true },
  { id:'va', from:'vercel', to:'auth',   color:'#a78bfa', marker:'auth',
    path:'M 595,108 C 595,152 595,158 595,182', label:'session', bidir:true },
  { id:'ar', from:'auth',   to:'resend', color:'#a78bfa', marker:'auth',
    path:'M 290,210 C 390,210 390,210 490,210', label:'OTP email', dash:'5 6' },
  { id:'ee', from:'expo',   to:'edge',   color:'#22d3ee', marker:'client',
    path:'M 185,108 C 185,224 295,292 316,312', label:'POST image' },
  { id:'ve', from:'vercel', to:'edge',   color:'#22d3ee', marker:'client',
    path:'M 595,108 C 595,224 495,292 464,312', label:'POST image' },
  { id:'er', from:'edge',   to:'rfdetr', color:'#34d399', marker:'ai',
    path:'M 323,368 C 323,410 185,410 185,432', label:'inference', bidir:true },
  { id:'ec', from:'edge',   to:'claude', color:'#34d399', marker:'ai',
    path:'M 457,368 C 457,410 595,410 595,432', label:'inference', bidir:true },
  { id:'ed', from:'edge',   to:'db',     color:'#f87171', marker:'data',
    path:'M 390,368 C 390,486 185,486 185,552', label:'save result' },
];

const NS = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('svg');

function el(tag, attrs={}, children=[]) {
  const e = document.createElementNS(NS, tag);
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k,v);
  for (const c of children) if (c) e.appendChild(c);
  return e;
}
function txt(tag, attrs, text) {
  const e = el(tag, attrs);
  e.textContent = text;
  return e;
}

function buildDefs() {
  const defs = el('defs');
  const markers = [
    ['client','#22d3ee'],['auth','#a78bfa'],['ai','#34d399'],['data','#f87171']
  ];
  for (const [id, fill] of markers) {
    defs.appendChild(el('marker',{id:`arr-${id}`,markerWidth:'8',markerHeight:'8',refX:'7',refY:'3',orient:'auto'},[
      el('path',{d:'M0,0 L0,6 L8,3 z',fill})
    ]));
    defs.appendChild(el('marker',{id:`arr-${id}-r`,markerWidth:'8',markerHeight:'8',refX:'1',refY:'3',orient:'auto'},[
      el('path',{d:'M8,0 L8,6 L0,3 z',fill})
    ]));
  }
  defs.appendChild(el('filter',{id:'glow',x:'-50%',y:'-50%',width:'200%',height:'200%'},[
    el('feGaussianBlur',{stdDeviation:'3',result:'blur'}),
    el('feMerge',{},[el('feMergeNode',{in:'blur'}),el('feMergeNode',{in:'SourceGraphic'})])
  ]));
  defs.appendChild(el('pattern',{id:'dots',x:'0',y:'0',width:'22',height:'22',patternUnits:'userSpaceOnUse'},[
    el('circle',{cx:'11',cy:'11',r:'0.8',fill:'#1a3448',opacity:'0.6'})
  ]));
  for (const L of LAYERS) {
    const g = el('linearGradient',{id:`band-${L.id}`,x1:'0',y1:'0',x2:'1',y2:'0'});
    g.appendChild(el('stop',{offset:'0%','stop-color':L.color,'stop-opacity':'0.07'}));
    g.appendChild(el('stop',{offset:'70%','stop-color':L.color,'stop-opacity':'0.03'}));
    g.appendChild(el('stop',{offset:'100%','stop-color':L.color,'stop-opacity':'0'}));
    defs.appendChild(g);
  }
  svg.appendChild(defs);
}

function buildBackground() {
  svg.appendChild(el('rect',{width:'780',height:'660',fill:'url(#dots)'}));
  for (const L of LAYERS) {
    svg.appendChild(el('rect',{
      x:'46',y:String(L.cy-38),width:'734',height:'76',rx:'4',
      fill:`url(#band-${L.id})`
    }));
  }
}

function buildLayerLabels() {
  const g = el('g',{'class':'layer-labels'});
  for (const L of LAYERS) {
    const lbl = txt('text',{
      x:'0',y:'0',
      transform:`translate(22,${L.cy}) rotate(-90)`,
      'text-anchor':'middle',
      fill: L.color,
      'class':'layer-lbl',
    }, L.label);
    g.appendChild(lbl);
  }
  svg.appendChild(g);
}

function buildEdges() {
  const g = el('g',{id:'edges'});
  for (const E of EDGES) {
    const pathEl = el('path',{
      id:`e-${E.id}`,
      d: E.path,
      stroke: E.color,
      'stroke-dasharray': E.dash || '8 5',
      'class':'edge-path',
      'marker-end':`url(#arr-${E.marker})`,
      ...(E.bidir ? {'marker-start':`url(#arr-${E.marker}-r)`} : {}),
    });
    pathEl.dataset.edge = E.id;
    g.appendChild(pathEl);
    const lblEl = txt('text',{
      id:`el-${E.id}`,
      'class':'edge-lbl',
      fill: E.color,
      'font-family':'Courier New, monospace',
    }, E.label);
    lblEl.dataset.pathId = `e-${E.id}`;
    g.appendChild(lblEl);
  }
  svg.appendChild(g);
}

function positionEdgeLabels() {
  for (const E of EDGES) {
    const pathEl = document.getElementById(`e-${E.id}`);
    const lblEl  = document.getElementById(`el-${E.id}`);
    if (!pathEl || !lblEl) continue;
    try {
      const len = pathEl.getTotalLength();
      const pt  = pathEl.getPointAtLength(len * 0.5);
      lblEl.setAttribute('x', String(pt.x + 4));
      lblEl.setAttribute('y', String(pt.y - 4));
    } catch(_) {}
  }
}

function buildNodes() {
  const g = el('g',{id:'nodes'});
  for (const [id, N] of Object.entries(NODES)) {
    const layer = LAYERS.find(l => l.id === N.layer);
    const color = layer?.color || '#888';
    const rx = N.cx - N.w/2;
    const ry = N.cy - N.h/2;
    const grp = el('g',{id:`n-${id}`,'class':'node-group'});
    grp.dataset.node = id;
    grp.appendChild(el('rect',{
      x:String(rx+2),y:String(ry+2),
      width:String(N.w),height:String(N.h),
      rx:'5',fill:color,opacity:'0.06'
    }));
    const bg = el('rect',{
      x:String(rx),y:String(ry),
      width:String(N.w),height:String(N.h),
      rx:'5','class':'node-bg',
    });
    bg.style.setProperty('--node-hover', color);
    grp.appendChild(bg);
    grp.appendChild(el('rect',{
      x:String(rx),y:String(ry+4),
      width:'3',height:String(N.h-8),
      rx:'1.5',fill:color
    }));
    grp.appendChild(txt('text',{
      x:String(rx+14),y:String(ry+22),
      'class':'node-title',
    }, N.title));
    grp.appendChild(txt('text',{
      x:String(rx+14),y:String(ry+38),
      'class':'node-sub',
    }, N.sub));
    const hit = el('rect',{
      x:String(rx),y:String(ry),
      width:String(N.w),height:String(N.h),
      fill:'transparent',rx:'5'
    });
    grp.appendChild(hit);
    grp.addEventListener('click', e => { e.stopPropagation(); selectNode(id); });
    grp.addEventListener('mouseenter', () => hoverNode(id, true));
    grp.addEventListener('mouseleave',  () => hoverNode(id, false));
    g.appendChild(grp);
  }
  svg.appendChild(g);
}

function applyNodeGlow(id, color) {
  const bg = document.querySelector(`#n-${id} .node-bg`);
  if (bg) {
    bg.style.stroke = color;
    bg.style.filter = `drop-shadow(0 0 6px ${color}60)`;
  }
}
function clearNodeGlow(id) {
  const bg = document.querySelector(`#n-${id} .node-bg`);
  if (bg) { bg.style.stroke = ''; bg.style.filter = ''; }
}

let selected = null;
function edgesFor(nodeId) {
  return EDGES.filter(e => e.from === nodeId || e.to === nodeId);
}
function hoverNode(id, on) {
  if (selected) return;
  const related = edgesFor(id).map(e => e.id);
  for (const E of EDGES) {
    const ep = document.getElementById(`e-${E.id}`);
    const el2 = document.getElementById(`el-${E.id}`);
    const active = related.includes(E.id);
    if (ep)  ep.classList.toggle('lit', on && active);
    if (el2) el2.classList.toggle('lit', on && active);
  }
  const layer = LAYERS.find(l => l.id === NODES[id]?.layer);
  if (on) applyNodeGlow(id, layer?.color || '#fff');
  else clearNodeGlow(id);
}

function selectNode(id) {
  const N = NODES[id];
  if (!N) return;
  if (selected === id) { clearSelection(); return; }
  selected = id;
  const layer = LAYERS.find(l => l.id === N.layer);
  const color = layer?.color || '#888';
  for (const nid of Object.keys(NODES)) {
    const g = document.getElementById(`n-${nid}`);
    if (!g) continue;
    g.classList.toggle('sel', nid === id);
    if (nid === id) applyNodeGlow(nid, color);
    else {
      clearNodeGlow(nid);
      const related = edgesFor(id).map(e => e.from === id ? e.to : e.from);
      document.querySelector(`#n-${nid} .node-bg`).style.opacity = related.includes(nid) ? '1' : '0.5';
    }
  }
  const relEdges = edgesFor(id).map(e => e.id);
  for (const E of EDGES) {
    const ep = document.getElementById(`e-${E.id}`);
    const lp = document.getElementById(`el-${E.id}`);
    const active = relEdges.includes(E.id);
    if (ep)  { ep.classList.toggle('lit', active); ep.style.opacity = active ? '' : '0.1'; }
    if (lp)  { lp.classList.toggle('lit', active); lp.style.opacity = active ? '' : '0.1'; }
  }
  const badge = document.getElementById('pbadge');
  badge.textContent = layer?.label || '';
  badge.style.background = color + '22';
  badge.style.color = color;
  document.getElementById('pname').textContent = N.title;
  document.getElementById('psub').textContent  = N.sub;
  const techRow = document.getElementById('ptech');
  techRow.innerHTML = '';
  for (const t of N.tech) {
    const c = document.createElement('span');
    c.className = 'tc'; c.textContent = t;
    techRow.appendChild(c);
  }
  document.getElementById('pdesc').textContent = N.desc;
  document.getElementById('panel').classList.add('open');
}

function clearSelection() {
  selected = null;
  document.getElementById('panel').classList.remove('open');
  for (const nid of Object.keys(NODES)) {
    document.getElementById(`n-${nid}`)?.classList.remove('sel');
    clearNodeGlow(nid);
    const bg = document.querySelector(`#n-${nid} .node-bg`);
    if (bg) bg.style.opacity = '';
  }
  for (const E of EDGES) {
    const ep = document.getElementById(`e-${E.id}`);
    const lp = document.getElementById(`el-${E.id}`);
    if (ep)  { ep.classList.remove('lit'); ep.style.opacity = ''; }
    if (lp)  { lp.classList.remove('lit'); lp.style.opacity = ''; }
  }
}

document.getElementById('pclose').addEventListener('click', clearSelection);
svg.addEventListener('click', clearSelection);

const TRACE_STEPS = [
  { nodes:['expo'],                edges:[],             ms:800,  label:'Photo captured on device…' },
  { nodes:['expo','edge'],          edges:['ee'],         ms:1000, label:'Image sent to Edge Function…' },
  { nodes:['edge','rfdetr','claude'],edges:['er','ec'],   ms:1300, label:'RF-DETR + Claude Haiku running in parallel…' },
  { nodes:['edge'],                 edges:['er','ec'],    ms:900,  label:'Agreement protocol applied…' },
  { nodes:['edge','db'],            edges:['ed'],         ms:900,  label:'AI result saved to database.' },
  { nodes:[],                       edges:[],             ms:600,  label:'Done.' },
];

function pulseNode(id, color) {
  applyNodeGlow(id, color);
  const bg = document.querySelector(`#n-${id} .node-bg`);
  if (bg) { bg.style.stroke = color; bg.style.strokeWidth = '2'; }
}

async function runTrace() {
  const btn    = document.getElementById('trace-btn');
  const status = document.getElementById('trace-status');
  if (btn.disabled) return;
  btn.disabled = true;
  clearSelection();
  status.classList.add('vis');
  const wait = ms => new Promise(r => setTimeout(r, ms));
  for (const nid of Object.keys(NODES)) {
    const bg = document.querySelector(`#n-${nid} .node-bg`);
    if (bg) bg.style.opacity = '0.35';
  }
  for (const E of EDGES) {
    const ep = document.getElementById(`e-${E.id}`);
    if (ep) ep.style.opacity = '0.07';
  }
  for (const step of TRACE_STEPS) {
    for (const nid of Object.keys(NODES)) clearNodeGlow(nid);
    for (const E of EDGES) {
      const ep = document.getElementById(`e-${E.id}`);
      if (ep) { ep.classList.remove('lit'); ep.style.opacity = '0.07'; }
    }
    status.textContent = step.label;
    for (const nid of step.nodes) {
      const layer = LAYERS.find(l => l.id === NODES[nid]?.layer);
      const c = layer?.color || '#fff';
      pulseNode(nid, c);
      const bg = document.querySelector(`#n-${nid} .node-bg`);
      if (bg) bg.style.opacity = '1';
    }
    for (const eid of step.edges) {
      const ep = document.getElementById(`e-${eid}`);
      if (ep) { ep.classList.add('lit'); ep.style.opacity = '0.95'; }
      animateDot(eid);
    }
    await wait(step.ms);
  }
  for (const nid of Object.keys(NODES)) {
    clearNodeGlow(nid);
    const bg = document.querySelector(`#n-${nid} .node-bg`);
    if (bg) { bg.style.opacity = ''; bg.style.strokeWidth = ''; }
  }
  for (const E of EDGES) {
    const ep = document.getElementById(`e-${E.id}`);
    if (ep) { ep.classList.remove('lit'); ep.style.opacity = ''; }
  }
  await wait(400);
  status.classList.remove('vis');
  btn.disabled = false;
}

function animateDot(edgeId) {
  const edgeDef = EDGES.find(e => e.id === edgeId);
  const pathEl  = document.getElementById(`e-${edgeId}`);
  if (!pathEl || !edgeDef) return;
  let length;
  try { length = pathEl.getTotalLength(); } catch(_) { return; }
  const dot = el('circle',{r:'5',fill:edgeDef.color,filter:'url(#glow)'});
  svg.appendChild(dot);
  const duration = 600;
  const start    = performance.now();
  function tick(now) {
    const t = Math.min((now - start) / duration, 1);
    try {
      const pt = pathEl.getPointAtLength(t * length);
      dot.setAttribute('cx', pt.x);
      dot.setAttribute('cy', pt.y);
    } catch(_) {}
    if (t < 1) requestAnimationFrame(tick);
    else { try { svg.removeChild(dot); } catch(_) {} }
  }
  requestAnimationFrame(tick);
}

document.getElementById('trace-btn').addEventListener('click', runTrace);

buildDefs();
buildBackground();
buildLayerLabels();
buildEdges();
buildNodes();
requestAnimationFrame(positionEdgeLabels);
</script>
